<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartDoor Vistony</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; font-family: Arial, Helvetica, sans-serif; background: #f2f2f2;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .card {
            width: 95%; max-width: 480px; background: white; border-radius: 18px;
            padding: 30px; box-shadow: 0 5px 20px rgba(0,0,0,.15); text-align: center;
        }
        .logo { width: 240px; max-width: 100%; margin-bottom: 20px; }
        .estado {
            background: #eef8ee; border-radius: 10px; padding: 15px;
            margin-bottom: 15px; font-weight: bold; line-height: 1.5; transition: background 0.3s ease;
        }
        .info-horario {
            background: #fcfcfc; border: 1px solid #e5e5e5; border-radius: 10px;
            padding: 12px; margin-bottom: 20px; font-size: 14px; color: #555;
            line-height: 1.5; text-align: left;
        }
        .reloj-text { border-top: 1px dashed #ddd; margin-top: 8px; padding-top: 8px; text-align: center; }
        .reloj-vivo { font-weight: bold; color: #333; font-size: 15px; letter-spacing: 0.5px; display: inline-block; }
        
        /* Contenedor de la Cámara */
        .camera-container {
            width: 100%; max-width: 320px; height: 240px; background: #000;
            margin: 0 auto 20px auto; border-radius: 12px; overflow: hidden;
            position: relative; border: 3px solid #eee;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { display: none; } /* Oculto, procesa la imagen en segundo plano */

        button {
            width: 100%; padding: 16px; border: none; border-radius: 10px;
            cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 15px;
            transition: background 0.3s ease;
        }
        button:disabled { background: #ccc !important; color: #666 !important; cursor: not-allowed; }
        .timbre { background: #d71920; color: white; }
        #respuesta { margin-top: 20px; font-weight: bold; min-height: 24px; }
    </style>
</head>
<body>

<div class="card">
    <img src="logo-vistony.png" class="logo" alt="Logo Vistony">
    
    <!-- Estado Comercial Dinámico -->
    <div id="estado" class="estado">⏳ Evaluando estado...</div>

    <!-- Panel de Horarios Oficiales -->
    <div class="info-horario">
        📅 <strong>Horario de Atención Bodega:</strong><br>
        • Lun a Mar: 08:00 a 17:00 h<br>
        • Mié a Vie: 08:00 a 16:00 h
        <div class="reloj-text">
            <div id="reloj" class="reloj-vivo">🕒 Cargando hora...</div>
        </div>
    </div>

    <h2>Bienvenido</h2>
    <p>Por favor, ubíquese frente a la pantalla y presione el botón para avisar su llegada.</p>

    <!-- Vista en vivo de la tablet -->
    <div class="camera-container">
        <video id="video" autoplay playsinline muted></video>
    </div>
    
    <!-- Capturador de resolución fija controlada para evitar imágenes pesadas -->
    <canvas id="canvas" width="640" height="480"></canvas>

    <button class="timbre" onclick="tomarFotoYTimbrar()">
        🔔 CAPTURAR FOTO Y AVISAR
    </button>

    <div id="respuesta"></div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const respuesta = document.getElementById('respuesta');
    const botonTimbre = document.querySelector('.timbre');

    // CONFIGURACIÓN CENTRAL OPERATIVA
    const HORA_INICIO = 8;
    const TIEMPO_BLOQUEO = 30; 
    const BODEGA_DISPONIBLE = true; // Cambiar a false en caso de emergencia extrema

    // 1. CONTROL DE HORARIOS AUTOMÁTICOS
    function esHorarioLaboral() {
        const ahora = new Date();
        const hora = ahora.getHours();
        const diaSemana = ahora.getDay(); // 0=Dom, 1=Lun, 2=Mar, 3=Mié, 4=Jue, 5=Vie, 6=Sáb

        if (diaSemana === 0 || diaSemana === 6) return false;

        // Lun y Mar (Cierre 17:00)
        if (diaSemana === 1 || diaSemana === 2) {
            return (hora >= HORA_INICIO && hora < 17);
        }
        // Mié, Jue y Vie (Cierre 16:00)
        if (diaSemana === 3 || diaSemana === 4 || diaSemana === 5) {
            return (hora >= HORA_INICIO && hora < 16);
        }
        return false;
    }

    // 2. ENTRADA EN VIVO DE RELOJ Y BANDERAS DE INHIBICIÓN
    function inicializarRelojYEstado() {
        const ahora = new Date();
        
        // Reloj en pantalla
        const opcionesFecha = { weekday: 'long', day: 'numeric', month: 'short' };
        const fechaTexto = ahora.toLocaleDateString('es-CL', opcionesFecha);
        const horaTexto = ahora.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        document.getElementById("reloj").innerHTML = `🕒 ${fechaTexto.charAt(0).toUpperCase() + fechaTexto.slice(1)} | ${horaTexto}`;

        // Control visual y de botones
        const estadoDiv = document.getElementById("estado");

        if (!BODEGA_DISPONIBLE) {
            estadoDiv.innerHTML = "⚠️ Cerrado por fuerza mayor<br>📦 Bodega no operativa temporalmente";
            estadoDiv.style.backgroundColor = "#fff0f0";
            estadoDiv.style.color = "#d71920";
            if (botonTimbre.innerHTML === "🔔 CAPTURAR FOTO Y AVISAR") botonTimbre.disabled = true;
        } else {
            estadoDiv.style.color = "#000";
            if (esHorarioLaboral()) {
                estadoDiv.innerHTML = "🟢 Horario de atención<br>📦 Bodega disponible";
                estadoDiv.style.backgroundColor = "#eef8ee";
                if (botonTimbre.innerHTML === "🔔 CAPTURAR FOTO Y AVISAR") botonTimbre.disabled = false;
            } else {
                estadoDiv.innerHTML = "🔴 Fuera de horario comercial<br>⚠️ No hay personal en bodega";
                estadoDiv.style.backgroundColor = "#fff0f0";
                if (botonTimbre.innerHTML === "🔔 CAPTURAR FOTO Y AVISAR") botonTimbre.disabled = true;
            }
        }
    }

    // Activar flujo de cámara
    async function iniciarCamara() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 640, height: 480, facingMode: "user" }, 
                audio: false 
            });
            video.srcObject = stream;
        } catch (error) {
            respuesta.innerHTML = "<span style='color:red;'>⚠️ Error: Requiere acceso a la cámara.</span>";
            botonTimbre.disabled = true;
        }
    }

    iniciarCamara();
    inicializarRelojYEstado();
    setInterval(inicializarRelojYEstado, 1000); // Sincroniza reloj e interfaz cada segundo

    // 3. CAPTURA Y TRANSMISIÓN BINARIA VIA POST
    async function tomarFotoYTimbrar() {
        if (!BODEGA_DISPONIBLE || !esHorarioLaboral()) {
            respuesta.innerHTML = "<span style='color:red;'>❌ Sistema fuera de servicio en este momento.</span>";
            return;
        }

        botonTimbre.disabled = true;
        respuesta.innerHTML = "⏳ Capturando fotografía y enviando aviso...";
        respuesta.style.color = "#333";

        const context = canvas.getContext('2d');
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        // Compresión controlada al 60% para que vuele por la red y no rompa límites de carga
        canvas.toBlob(async (blob) => {
            if (!blob) {
                respuesta.innerHTML = "<span style='color:red;'>❌ Error de procesamiento de imagen.</span>";
                botonTimbre.disabled = false;
                return;
            }

            const formData = new FormData();
            formData.append('foto', blob, 'cliente.jpg');

            try {
                // LLAMADO AL WORKER (Sin headers forzados a mano)
                const r = await fetch("https://smartdoor-vistony.vistonyccp.workers.dev/", {
                    method: "POST",
                    body: formData 
                });

                const data = await r.json();

                if (r.ok && !data.error) {
                    respuesta.innerHTML = "<span style='color:green;'>✅ Foto enviada. Personal notificado.</span>";
                    
                    // Lanzar el contador visual Anti-Spam
                    let segundosRestantes = TIEMPO_BLOQUEO;
                    const intervalo = setInterval(() => {
                        segundosRestantes--;
                        botonTimbre.innerHTML = `⏳ ESPERE (${segundosRestantes}s)`;
                        if(segundosRestantes <= 0) {
                            clearInterval(intervalo);
                            botonTimbre.innerHTML = "🔔 CAPTURAR FOTO Y AVISAR";
                            inicializarRelojYEstado();
                        }
                    }, 1000);

                } else {
                    respuesta.innerHTML = `<span style='color:red;'>❌ Error: ${data.error || 'No se pudo enviar.'}</span>`;
                    botonTimbre.disabled = false;
                }
            } catch (e) {
                respuesta.innerHTML = "<span style='color:red;'>❌ Error de conexión con el servidor.</span>";
                botonTimbre.disabled = false;
            }
        }, 'image/jpeg', 0.6); 
    }
</script>
</body>
</html>
