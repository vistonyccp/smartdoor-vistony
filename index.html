<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartDoor Vistony</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:white;
    width:90%;
    max-width:450px;
    border-radius:20px;
    padding:30px;
    box-shadow:0 4px 20px rgba(0,0,0,.15);
    text-align:center;
}

.logo{
    width:100%;
    max-width:250px;
    margin-bottom:20px;
}

.estado{
    color:green;
    font-weight:bold;
    margin-bottom:20px;
}

.boton{
    width:100%;
    border:none;
    border-radius:12px;
    padding:18px;
    margin:10px 0;
    font-size:18px;
    cursor:pointer;
}

.timbre{
    background:#d71920;
    color:white;
}

.secundario{
    background:#efefef;
}

.mensaje{
    margin-top:20px;
    color:#333;
}

</style>

</head>
<body>

<div class="card">

<img src="logo-vistony.png" class="logo" alt="Vistony">

<div class="estado">
🟢 Disponible
</div>

<h2>Bienvenido</h2>

<p>
Si necesita atención presione el botón.
</p>

<button class="boton timbre" onclick="timbre()">
🔔 ESTOY EN LA PUERTA
</button>

<button class="boton secundario">
🎤 Mensaje de voz
</button>

<button class="boton secundario">
📹 Mensaje de video
</button>

<button class="boton secundario">
💬 Escribir mensaje
</button>

<div id="respuesta" class="mensaje"></div>

</div>

<script>

function timbre(){

document.getElementById("respuesta").innerHTML=
"✅ Hemos recibido tu aviso. En un momento te atenderemos.";

}

</script>

</body>
</html>
