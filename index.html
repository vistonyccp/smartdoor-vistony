<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartDoor Vistony - Cámara</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; font-family: Arial, sans-serif; background: #f2f2f2;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .card {
            width: 95%; max-width: 480px; background: white; border-radius: 18px;
            padding: 30px; box-shadow: 0 5px 20px rgba(0,0,0,.15); text-align: center;
        }
        .logo { width: 240px; max-width: 100%; margin-bottom: 20px; }
        
        /* Contenedor de la cámara */
        .camera-container {
            width: 100%; max-width: 320px; height: 240px; background: #000;
            margin: 0 auto 20px auto; border-radius: 12px; overflow: hidden;
            position: relative; border: 3px solid #eee;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { display: none; } /* Oculto, solo se usa para congelar la foto */

        button {
            width: 100%; padding: 16px; border: none; border-radius: 10px;
            cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 15px;
            transition: background 0.3s ease;
        }
        button:disabled { background: #ccc !important; color: #666 !important; cursor: not-allowed; }
        .timbre { background: #d71920; color: white; }
        #respuesta { margin-top: 20px; font-weight: bold; min-height: 24px; }
    </style>
</head>
<body>

<div class="card">
    <img src="logo-vistony.png" class="logo" alt="Logo Vistony">
    <h2>Timbre de Acceso</h2>
    <p>Por favor, ubíquese frente a la pantalla y presione el botón para avisar su llegada.</p>

    <!-- Vista previa de la cámara web/tablet -->
    <div class="camera-container">
        <video id="video" autoplay playsinline muted></video>
    </div>
    
    <!-- Canvas oculto para capturar el frame -->
    <canvas id="canvas" width="640" height="480"></canvas>

    <button class="timbre" onclick="tomarFotoYTimbrar()">
        🔔 CAPTURAR FOTO Y AVISAR
    </button>

    <div id="respuesta"></div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const respuesta = document.getElementById('respuesta');
    const botonTimbre = document.querySelector('.timbre');

    // 1. Encender la cámara automáticamente al abrir la página
    async function iniciarCamara() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 640, height: 480, facingMode: "user" }, // "user" prefiere la cámara frontal
                audio: false 
            });
            video.srcObject = stream;
        } catch (error) {
            console.error("Error al acceder a la cámara:", error);
            respuesta.innerHTML = "<span style='color:red;'>⚠️ Error: Se requiere acceso a la cámara para usar el timbre.</span>";
            botonTimbre.disabled = true;
        }
    }

    // Iniciar cámara al cargar
    iniciarCamara();

    // 2. Capturar la foto y mandarla como archivo binario
    async function tomarFotoYTimbrar() {
        botonTimbre.disabled = true;
        respuesta.innerHTML = "⏳ Capturando fotografía y enviando aviso...";
        respuesta.style.color = "#333";

        // Dibujar el cuadro actual del video en el canvas oculto
        const context = canvas.getContext('2d');
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        // Convertir el canvas a un archivo Blob (JPEG)
        canvas.toBlob(async (blob) => {
            if (!blob) {
                respuesta.innerHTML = "<span style='color:red;'>❌ Error al procesar la imagen.</span>";
                botonTimbre.disabled = false;
                return;
            }

            // Crear un formulario virtual para enviar el archivo binario
            const formData = new FormData();
            formData.append('foto', blob, 'cliente.jpg');

            try {
                // Enviar al Worker de Cloudflare
                const r = await fetch("https://smartdoor-vistony.vistonyccp.workers.dev/", {
                    method: "POST",
                    body: formData // Nota: Al usar FormData NO debes poner headers de Content-Type, el navegador lo hace solo
                });

                if (r.ok) {
                    respuesta.innerHTML = "<span style='color:green;'>✅ Foto enviada. Personal notificado.</span>";
                } else {
                    respuesta.innerHTML = "<span style='color:red;'>❌ No se pudo enviar el aviso a la bodega.</span>";
                }
            } catch (e) {
                respuesta.innerHTML = "<span style='color:red;'>❌ Error de conexión con el servidor.</span>";
            }

            // Desbloquear botón tras 10 segundos
            setTimeout(() => {
                botonTimbre.disabled = false;
                respuesta.innerHTML = "";
            }, 10000);

        }, 'image/jpeg', 0.85); // 0.85 es la calidad de compresión (buena resolución, poco peso)
    }
</script>

</body>
</html>
