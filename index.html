<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartDoor Vistony</title>

<script>

const HORA_INICIO = 8;
const HORA_FIN = 17;
const BODEGA_DISPONIBLE = true;

// Variable global para controlar el tiempo de bloqueo del timbre (en segundos)
const TIEMPO_BLOQUEO = 30; 

function actualizarEstado(){
    const ahora = new Date();
    const hora = ahora.getHours();
    let texto = "";

    if(hora >= HORA_INICIO && hora < HORA_FIN){
        texto += "🟢 Horario de atención<br>";
    } else {
        texto += "🔴 Fuera de horario<br>";
    }

    if(BODEGA_DISPONIBLE){
        texto += "📦 Bodega disponible";
    } else {
        texto += "⚠️ No hay personal en bodega";
    }

    document.getElementById("estado").innerHTML = texto;
}

actualizarEstado();

// Función auxiliar para borrar los mensajes de respuesta automáticamente
function limpiarRespuesta(ms = 5000) {
    setTimeout(() => {
        document.getElementById("respuesta").innerHTML = "";
    }, ms);
}

async function timbre(){
    const botonTimbre = document.querySelector(".timbre");
    const respuesta = document.getElementById("respuesta");
    const horaActual = new Date().toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });

    // Deshabilitamos el botón inmediatamente para evitar doble click
    botonTimbre.disabled = true;
    respuesta.innerHTML = "⏳ Enviando aviso...";

    try {
        const r = await fetch("https://smartdoor-vistony.vistonyccp.workers.dev/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                mensaje: `🔔 *¡ALERTA DE TIMBRE!*\n👤 Un cliente ha llegado y espera en la puerta principal.\n⏰ Hora: ${horaActual}`
            })
        });

        if(r.ok){
            respuesta.innerHTML = "✅ Aviso enviado correctamente. Por favor, espere.";
            
            // Inicia cuenta regresiva en el botón antes de permitir tocar otra vez
            let segundosRestantes = TIEMPO_BLOQUEO;
            const intervalo = setInterval(() => {
                segundosRestantes--;
                botonTimbre.innerHTML = `⏳ ESPERE (${segundosRestantes}s)`;
                if(segundosRestantes <= 0) {
                    clearInterval(intervalo);
                    botonTimbre.disabled = false;
                    botonTimbre.innerHTML = "🔔 ESTOY EN LA PUERTA";
                }
            }, 1000);

        } else {
            respuesta.innerHTML = "❌ No fue posible enviar el aviso.";
            botonTimbre.disabled = false; // Si falló, permitimos reintentar
        }
    } catch(e) {
        respuesta.innerHTML = "❌ Error de conexión con el servidor.";
        botonTimbre.disabled = false;
    }
    
    limpiarRespuesta(6000);
}

async function enviarMensaje(){
    const botonEnviar = document.querySelector(".secundario");
    const nombre = document.getElementById("nombre").value.trim();
    const empresa = document.getElementById("empresa").value.trim();
    const telefono = document.getElementById("telefono").value.trim();
    const mensaje = document.getElementById("mensaje").value.trim();

    if(nombre == "" || mensaje == ""){
        alert("Por favor, ingrese al menos su nombre y el mensaje.");
        return;
    }

    const respuesta = document.getElementById("respuesta");
    botonEnviar.disabled = true;
    respuesta.innerHTML = "⏳ Enviando mensaje...";

    try {
        const r = await fetch("https://smartdoor-vistony.vistonyccp.workers.dev/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                mensaje: `📩 *NUEVO MENSAJE RECIBIDO*\n\n👤 *Nombre:* ${nombre}\n🏢 *Empresa:* ${empresa || 'No especificada'}\n📞 *Teléfono:* ${telefono || 'No especificado'}\n💬 *Mensaje:* ${mensaje}`
            })
        });

        if(r.ok){
            respuesta.innerHTML = "✅ Mensaje enviado correctamente.";
            
            // Limpiar formulario
            document.getElementById("nombre").value = "";
            document.getElementById("empresa").value = "";
            document.getElementById("telefono").value = "";
            document.getElementById("mensaje").value = "";
        } else {
            respuesta.innerHTML = "❌ No fue posible enviar el mensaje.";
        }
    } catch(e) {
        respuesta.innerHTML = "❌ Error de conexión.";
    }

    botonEnviar.disabled = false;
    limpiarRespuesta(5000);
}
</script>s

</body>
</html>
