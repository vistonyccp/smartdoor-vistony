<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SmartDoor</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial;background:#f2f2f2;display:flex;justify-content:center;align-items:center;min-height:100vh}.card{background:#fff;width:95%;max-width:460px;padding:28px;border-radius:18px;box-shadow:0 4px 18px rgba(0,0,0,.15);text-align:center}.logo{max-width:220px;width:100%}.estado{background:#eef8ee;padding:12px;border-radius:10px;margin:18px 0;font-weight:bold}button{width:100%;padding:16px;margin-top:12px;border:none;border-radius:10px}.t{background:#d71920;color:#fff}.s{background:#ececec}input,textarea{width:100%;padding:12px;margin-top:10px}textarea{height:100px}</style></head><body><div class="card"><img src="logo-vistony.png" class="logo"><div id="estado" class="estado"></div><h2>Bienvenido</h2><p>Si necesita atención presione el botón.</p><button class="t" onclick="timbre()">🔔 ESTOY EN LA PUERTA</button><hr><h3>📩 Dejar un mensaje</h3><input id="nombre" placeholder="Nombre"><input id="empresa" placeholder="Empresa"><input id="telefono" placeholder="Teléfono"><textarea id="mensaje" placeholder="Escriba su mensaje..."></textarea><button class="s" onclick="enviarMensaje()">📨 Enviar mensaje</button><div id="respuesta"></div></div><script>const HORA_INICIO=8,HORA_FIN=17,BODEGA_DISPONIBLE=true;function actualizarEstado(){const h=new Date().getHours();estado.innerHTML=(h>=HORA_INICIO&&h<HORA_FIN?"🟢 Horario de atención<br>":"🔴 Fuera de horario<br>")+(BODEGA_DISPONIBLE?"📦 Bodega disponible":"⚠️ No hay personal en bodega")}actualizarEstado();async function enviar(p){return fetch("https://smartdoor-vistony.vistonyccp.workers.dev/",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(p)})}async function timbre(){respuesta.textContent="Enviando...";try{const r=await enviar({mensaje:"👤 Hay un cliente esperando en la puerta principal."});respuesta.textContent=r.ok?"✅ Aviso enviado":"❌ Error";}catch{respuesta.textContent="❌ Error de conexión";}}async function enviarMensaje(){if(!nombre.value.trim()||!mensaje.value.trim()){alert("Ingrese nombre y mensaje");return}respuesta.textContent="Enviando...";try{const r=await enviar({mensaje:`📩 NUEVO MENSAJE

👤 ${nombre.value}
🏢 ${empresa.value}
📞 ${telefono.value}
💬 ${mensaje.value}`});respuesta.textContent=r.ok?"✅ Mensaje enviado":"❌ Error";}catch{respuesta.textContent="❌ Error de conexión";}}</script></body></html>
